<!DOCTYPE html>
<html>
<head>

<style>

body{
background:black;
color:#00ff00;
font-family:Courier New;
padding:40px;

}

canvas{
position:fixed;

animation: blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

.contact{
margin-top:40px;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border:2px solid #00ff00;
color:#00ff00;
text-decoration:none;
font-size:18px;
transition:0.3s;
box-shadow:0 0 5px #00ff00;
}

.btn:hover{
background:#00ff00;
color:black;
box-shadow:
0 0 10px #00ff00,
0 0 20px #00ff00,
0 0 40px #00ff00;
transform:scale(1.1);
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>MD. ASIF JAHAN</h1>

<p>> System initializing...</p>
<p>> Identity: Planning Professional</p>
<p>> Company: Hameem Denim Ltd</p>
<p>> Skills: SAP | Excel | Production Planning</p>
<p>> Location: Bangladesh</p>

<p>> Status: Active<span class="cursor">_</span></p>

<div class="contact">

<a class="btn" href="https://linkedin.com/in/mdasifjahan" target="_blank">LinkedIn</a>

</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix = letters.split("");

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#0F0";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text = matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
