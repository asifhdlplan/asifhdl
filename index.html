<!DOCTYPE html>
<html>
<head>
<title>MD. ASIF JAHAN</title>

<style>

body{
background:black;
color:#00ff00;
font-family:Aptos;
padding:80px;
text-align:center;
overflow:hidden;
margin:0;
cursor: crosshair;
}

/* Hacker cursor */

a:hover{
cursor: pointer;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.content{
background:rgba(0,0,0,0.75);
padding:75px;
border-radius:20px;
display:inline-block;
box-shadow:0 0 40px #00ff00;
}

h1{
font-size:75px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

.contact{
margin-top:75px;
}

.btn{
display:inline-block;
margin:20px;
padding:25px 50px;
border:4px solid #00ff00;
color:#00ff00;
text-decoration:none;
font-size:40px;
transition:0.3s;
box-shadow:0 0 10px #00ff00;
}

.btn:hover{
background:#00ff00;
color:black;
box-shadow:
0 0 20px #00ff00,
0 0 40px #00ff00,
0 0 80px #00ff00;
transform:scale(1.1);
}

</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
<source src="hacker.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<div class="content">

<h1>MD. ASIF JAHAN</h1>

<p>> System initializing...</p>
<p>> Identity: Planning Professional</p>
<p>> Company: Hameem Denim Ltd</p>
<p>> Skills: SAP | Excel | Production Planning</p>
<p>> Location: Bangladesh</p>

<p>> Status: Active<span class="cursor">_</span></p>

<div class="contact">

<h2>> Contact Me</h2>

<a class="btn" href="https://facebook.com/asif.j30" target="_blank">Facebook</a>

<a class="btn" href="https://instagram.com/resetasif" target="_blank">Instagram</a>

<a class="btn" href="https://linkedin.com/in/mdasifjahan" target="_blank">LinkedIn</a>

</div>

</div>

<script>

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix=letters.split("");

const fontSize=16;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
